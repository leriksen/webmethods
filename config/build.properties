###############################################################################
# webMethods Deployer — build.properties
# Used for repository-based builds (ABE output, Git checkout, or local export).
# No live Integration Server connection required.
#
# Usage:
#   ./projectautomator.sh -buildProperties build.properties -log build.log
#
# For Azure DevOps: variable substitution is handled by the pipeline using
# scripts/generate_configs.sh before projectautomator.sh is invoked.
#
# Variables below use ${VAR_NAME} — substituted via envsubst or your CI tool.
###############################################################################


###############################################################################
# 1. Repository Configuration
###############################################################################

# Source type: local (ABE/filesystem), vcs (git/svn), or assetRepo
repo.type=${REPO_TYPE}

# Absolute path to the directory containing IS packages and config artifacts.
# In Azure DevOps: typically $(Build.ArtifactStagingDirectory)/repoExport
repo.path=${REPO_PATH}

# Uncomment for VCS-based builds:
# repo.url=${REPO_URL}
# repo.branch=${REPO_BRANCH}
# repo.username=${REPO_USER}
# repo.password=encrypted:${REPO_PASSWORD}


###############################################################################
# 2. Project Configuration
###############################################################################

project.name=${WM_PROJECT_NAME}
project.folder=${WM_PROJECT_FOLDER}


###############################################################################
# 3. Archive Metadata
###############################################################################

# Dynamic naming prevents overwriting previous builds.
# Recommended pattern: <prefix>_<branch>_<buildId>
archive.name=${ARCHIVE_PREFIX}_${BUILD_VERSION}_${BUILD_ID}
archive.description=Deployment archive generated during CI build ${BUILD_ID} from branch ${BUILD_VERSION}
archive.output.dir=${ARCHIVE_OUTPUT_DIR}


###############################################################################
# 4. Deployment Set Definition
###############################################################################

deployments.set.name=${WM_DEPLOYMENT_SET}
deployments.set.description=${WM_DEPLOYMENT_SET_DESC}


###############################################################################
# 5. Assets to Include
###############################################################################

# Comma-separated list of IS package names (relative to repo.path)
packages=${WM_PACKAGES}

# Comma-separated list of config file paths (relative to repo.path)
config.files=${WM_CONFIG_FILES}


###############################################################################
# 6. Target Alias (pre-mapping for deployment stage)
###############################################################################

target.alias=${WM_TARGET_ALIAS}


###############################################################################
# 7. Build Output Control
###############################################################################

build.log.dir=${LOG_DIR}
build.timestamp=true
overwrite.archive=true


###############################################################################
# 8. Versioning / Traceability
###############################################################################

build.version=${BUILD_VERSION}
build.label=${BUILD_LABEL}
branch.name=${SOURCE_BRANCH_NAME}
commit.id=${SOURCE_COMMIT}
