# azure-pipelines.yml — webMethods Deployer CI/CD Pipeline
#
# All stages and steps are defined in:
#   pipelines/templates/webmethods-deploy.yml
#
# Variable Groups (configure in Azure DevOps Library → Variable groups):
#   webMethods-Common — non-secret project variables
#   webMethods-QA     — environment credentials linked to Key Vault
#
# Required Key Vault secrets (surfaced via webMethods-QA variable group):
#   IS-Admin-User     — Integration Server admin username
#   IS-Admin-Password — Integration Server admin password

trigger:
  branches:
    include:
      - main
      - release/*

pr:
  branches:
    include:
      - main

variables:
  - group: webMethods-Common
  - group: webMethods-QA

extends:
  template: templates/webmethods-deploy.yml
  parameters:
    # ── Agent ────────────────────────────────────────────────────────────────
    agentPool: webmethods-agents

    # ── Project ──────────────────────────────────────────────────────────────
    projectName: $(projectName)
    projectFolder: /opt/wmprojects/deployer

    # ── Source IS (leave blank for repo-based/ABE builds) ────────────────────
    sourceHost: $(sourceHost)
    sourcePort: $(sourcePort)
    sourceUser: $(IS_Admin_User)
    sourcePassword: $(IS_Admin_Password)

    # ── Target IS ────────────────────────────────────────────────────────────
    targetAlias: $(targetAlias)
    targetHost: $(targetHost)
    targetPort: $(targetPort)
    targetUser: $(IS_Admin_User)
    targetPassword: $(IS_Admin_Password)

    # ── Archive ───────────────────────────────────────────────────────────────
    archivePrefix: $(archivePrefix)
    archiveOutputDir: /opt/wmprojects/deployer/archives

    # ── Deployment set & packages ─────────────────────────────────────────────
    deploymentSetName: $(deploymentSetName)
    deploymentSetDesc: $(deploymentSetDesc)
    packages: $(packages)
    configFiles: $(configFiles)

    # ── Repository ────────────────────────────────────────────────────────────
    repoType: local
    repoPath: $(Build.ArtifactStagingDirectory)/repoExport

    # ── Paths on agent ────────────────────────────────────────────────────────
    wmConfigDir: /opt/wmprojects/config
    logDir: /opt/wmprojects/logs

    # ── Deployment behaviour ──────────────────────────────────────────────────
    simulate: false
    restartAfterDeploy: false
    continueOnError: false

    # ── Health check ──────────────────────────────────────────────────────────
    pingRetries: 5
    pingDelay: 10

    # ── Environment (approval gate) ───────────────────────────────────────────
    deployEnvironment: webmethods-qa
